<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Portofolio RDS - Rajib Digital Solution</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .portfolio-hero {
            background: linear-gradient(135deg, #0a192f, #0a0f1a);
            padding: 120px 0 60px;
            text-align: center;
        }
        .portfolio-hero h1 { font-size: 48px; margin-bottom: 15px; }
        .portfolio-hero h1 span { color: #64ffda; }
        .portfolio-hero p { font-size: 18px; color: #94a3b8; }
        .portfolio-filter {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 40px 0;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: transparent;
            border: 1px solid #64ffda;
            color: #64ffda;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }
        .filter-btn.active, .filter-btn:hover { background: #64ffda; color: #0a192f; }
        .portfolio-grid-page {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            padding: 0 0 60px;
        }
        @media (max-width: 768px) {
            .portfolio-hero h1 { font-size: 32px; }
        }
    </style>
</head>
<body>
    <a href="https://wa.me/628211951858" class="wa-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <header class="header">
        <div class="container">
            <div class="logo"><h1>RDS</h1><p>Rajib Digital Solution</p></div>
            <nav class="nav" id="navMenu">
                <a href="index.html">Beranda</a><a href="services.html">Layanan</a>
                <a href="portfolio.html">Portofolio</a>
                <a href="contact.html">Kontak</a>
            </nav>
            <div class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></div>
        </div>
    </header>

    <section class="portfolio-hero">
        <h1>Portofolio <span>RDS</span></h1>
        <p>Beberapa karya unggulan yang telah kami selesaikan untuk klien.</p>
    </section>

    <div class="container">
        <div class="portfolio-filter">
            <button class="filter-btn active" data-filter="all">Semua</button>
            <button class="filter-btn" data-filter="web">Website</button>
            <button class="filter-btn" data-filter="mobile">Mobile App</button>
            <button class="filter-btn" data-filter="security">Cyber Security</button>
        </div>
        <div class="portfolio-grid-page" id="portfolioGridPage"></div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-grid">
                <div><h3>RDS</h3><div class="social-links" id="socialLinks"></div></div>
                <div><h4>Menu</h4><a href="index.html">Beranda</a><a href="services.html">Layanan</a><a href="portfolio.html">Portofolio</a></div>
                <div><h4>Kontak</h4><p><i class="fab fa-whatsapp"></i> +62 821-1951-858</p></div>
            </div>
            <div class="footer-bottom"><p>© 2025 RDS - Rajib Digital Solution.</p></div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        const portfolioDataPage = [
            { title: "E-Commerce Marketplace", category: "web", desc: "Full Stack Web App dengan payment gateway", icon: "fas fa-shopping-cart" },
            { title: "Company Profile", category: "web", desc: "Sistem manajemen proyek rating A+", icon: "fas fa-building" },
            { title: "Laundry Mobile App", category: "mobile", desc: "Aplikasi tracking & payment", icon: "fas fa-mobile-alt" },
            { title: "Security Audit System", category: "security", desc: "Automated security scanning", icon: "fas fa-shield-alt" },
            { title: "Sistem Informasi Sekolah", category: "web", desc: "LMS & manajemen akademik", icon: "fas fa-school" },
            { title: "ERP System", category: "web", desc: "Enterprise resource planning", icon: "fas fa-chart-line" }
        ];
        
        function renderPortfolioPage(filter = 'all') {
            const grid = document.getElementById('portfolioGridPage');
            const filtered = filter === 'all' ? portfolioDataPage : portfolioDataPage.filter(p => p.category === filter);
            grid.innerHTML = '';
            filtered.forEach(p => {
                grid.innerHTML += `
                    <div class="portfolio-card">
                        <div class="portfolio-img"><i class="${p.icon}"></i></div>
                        <div class="portfolio-info"><h3>${p.title}</h3><p>${p.desc}</p></div>
                    </div>
                `;
            });
        }
        
        renderPortfolioPage();
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderPortfolioPage(btn.getAttribute('data-filter'));
            });
        });
        renderSocialLinks();
        initMobileMenu();
    </script>
</body>
</html>
