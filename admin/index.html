<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - RDS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0f1a;
            color: #e6f1ff;
        }
        .admin-header {
            background: #111827;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #64ffda;
        }
        .admin-header h1 { color: #64ffda; font-size: 20px; }
        .logout-btn { background: #ff4444; color: white; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; }
        .admin-container { display: flex; min-height: calc(100vh - 60px); }
        .sidebar {
            width: 250px;
            background: #111827;
            padding: 20px;
            border-right: 1px solid #2d3a5e;
        }
        .sidebar a {
            display: block;
            padding: 12px;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 10px;
            margin-bottom: 8px;
            transition: 0.3s;
        }
        .sidebar a:hover, .sidebar a.active { background: #64ffda20; color: #64ffda; }
        .content { flex: 1; padding: 30px; overflow-y: auto; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #111827;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #2d3a5e;
        }
        .stat-card h3 { font-size: 32px; color: #64ffda; }
        .data-table {
            background: #111827;
            border-radius: 15px;
            padding: 20px;
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #2d3a5e; }
        th { color: #64ffda; }
        .form-group { margin-bottom: 15px; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 10px;
            background: #0a0f1a;
            border: 1px solid #2d3a5e;
            border-radius: 8px;
            color: white;
        }
        button { background: #64ffda; color: #0a192f; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; margin: 5px; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #111827;
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
        }
        @media (max-width: 768px) { .admin-container { flex-direction: column; } .sidebar { width: 100%; } }
    </style>
</head>
<body>
    <div class="admin-header">
        <h1><i class="fas fa-shield-alt"></i> RDS Admin Dashboard</h1>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
    <div class="admin-container">
        <div class="sidebar">
            <a href="#" class="active" data-page="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="#" data-page="testimonials"><i class="fas fa-comment"></i> Testimoni</a>
            <a href="#" data-page="portfolio"><i class="fas fa-folder"></i> Portofolio</a>
            <a href="#" data-page="blog"><i class="fas fa-blog"></i> Blog</a>
            <a href="#" data-page="bookings"><i class="fas fa-calendar"></i> Booking</a>
            <a href="#" data-page="messages"><i class="fas fa-envelope"></i> Pesan</a>
        </div>
        <div class="content" id="content"></div>
    </div>

    <div id="modal" class="modal"><div class="modal-content" id="modalContent"></div></div>

    <script>
        if (!localStorage.getItem('adminLoggedIn')) window.location.href = 'login.html';
        
        function logout() { localStorage.removeItem('adminLoggedIn'); window.location.href = 'login.html'; }
        
        function showModal(title, content) {
            document.getElementById('modalContent').innerHTML = `<h3>${title}</h3>${content}<button style="margin-top:15px" onclick="closeModal()">Tutup</button>`;
            document.getElementById('modal').classList.add('active');
        }
        function closeModal() { document.getElementById('modal').classList.remove('active'); }
        
        let currentPage = 'dashboard';
        
        // Data contoh
        let testimonials = [
            { id: 1, name: "Donwahab Pool", text: "Website simpel, rapi, mudah diakses. 👍", role: "Jasa Kolam" },
            { id: 2, name: "Enjang Rahman", text: "Sangat bagus, mantap!", role: "Klien Puas" }
        ];
        let portfolios = [
            { id: 1, title: "E-Commerce Marketplace", category: "web", description: "Payment gateway" },
            { id: 2, title: "Company Profile", category: "web", description: "Rating A+" }
        ];
        let blogs = [
            { id: 1, title: "Cara Melindungi Website", category: "Security", excerpt: "Pelajari teknik mencegah XSS" }
        ];
        let bookings = [
            { id: 1, name: "Budi Santoso", service: "Web Development", date: "2026-05-15", status: "pending" }
        ];
        let messages = [
            { id: 1, name: "Andi", email: "andi@email.com", message: "Mau tanya harga website", status: "unread" }
        ];
        
        function renderDashboard() {
            document.getElementById('content').innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card"><h3>${testimonials.length}</h3><p>Testimoni</p></div>
                    <div class="stat-card"><h3>${portfolios.length}</h3><p>Portofolio</p></div>
                    <div class="stat-card"><h3>${blogs.length}</h3><p>Blog</p></div>
                    <div class="stat-card"><h3>${bookings.length}</h3><p>Booking</p></div>
                    <div class="stat-card"><h3>${messages.length}</h3><p>Pesan</p></div>
                </div>
                <div class="data-table"><h3>Selamat Datang di Dashboard Admin RDS</h3><p>Kelola testimoni, portofolio, blog, booking, dan pesan dari sini.</p></div>
            `;
        }
        
        function renderTestimonials() {
            let html = `<div class="data-table"><h3>Testimoni</h3><button onclick="showAddTestimonial()">+ Tambah Testimoni</button><table><tr><th>Nama</th><th>Testimoni</th><th>Aksi</th></tr>`;
            testimonials.forEach(t => {
                html += `<tr><td>${t.name}</td><td>${t.text.substring(0, 50)}...</td><td><button onclick="editTestimonial(${t.id})">Edit</button> <button onclick="deleteTestimonial(${t.id})">Hapus</button></td></tr>`;
            });
            html += `</table></div>`;
            document.getElementById('content').innerHTML = html;
        }
        
        function showAddTestimonial() { showModal('Tambah Testimoni', `<input type="text" id="name" placeholder="Nama"><textarea id="text" placeholder="Testimoni"></textarea><input type="text" id="role" placeholder="Role"><button onclick="addTestimonial()">Simpan</button>`); }
        function addTestimonial() { alert('Demo: Testimoni ditambahkan'); closeModal(); renderTestimonials(); }
        function editTestimonial(id) { alert(`Edit testimoni ID ${id}`); closeModal(); }
        function deleteTestimonial(id) { if(confirm('Hapus testimoni?')) { alert('Demo: Testimoni dihapus'); renderTestimonials(); } }
        
        function renderPortfolio() {
            let html = `<div class="data-table"><h3>Portofolio</h3><button onclick="showAddPortfolio()">+ Tambah Portofolio</button><table><tr><th>Judul</th><th>Kategori</th><th>Aksi</th></tr>`;
            portfolios.forEach(p => {
                html += `<tr><td>${p.title}</td><td>${p.category}</td><td><button onclick="editPortfolio(${p.id})">Edit</button> <button onclick="deletePortfolio(${p.id})">Hapus</button></td></tr>`;
            });
            html += `</table></div>`;
            document.getElementById('content').innerHTML = html;
        }
        function showAddPortfolio() { showModal('Tambah Portofolio', `<input type="text" id="title" placeholder="Judul"><select id="category"><option value="web">Website</option><option value="mobile">Mobile App</option></select><textarea id="desc" placeholder="Deskripsi"></textarea><button onclick="addPortfolio()">Simpan</button>`); }
        function addPortfolio() { alert('Demo: Portofolio ditambahkan'); closeModal(); renderPortfolio(); }
        function editPortfolio(id) { alert(`Edit portofolio ID ${id}`); closeModal(); }
        function deletePortfolio(id) { if(confirm('Hapus portofolio?')) { alert('Demo: Portofolio dihapus'); renderPortfolio(); } }
        
        function renderBlog() {
            let html = `<div class="data-table"><h3>Blog</h3><button onclick="showAddBlog()">+ Tambah Artikel</button><table><tr><th>Judul</th><th>Kategori</th><th>Aksi</th></tr>`;
            blogs.forEach(b => {
                html += `<tr><td>${b.title}</td><td>${b.category}</td><td><button onclick="editBlog(${b.id})">Edit</button> <button onclick="deleteBlog(${b.id})">Hapus</button></td></tr>`;
            });
            html += `</table></div>`;
            document.getElementById('content').innerHTML = html;
        }
        function showAddBlog() { showModal('Tambah Artikel', `<input type="text" id="title" placeholder="Judul"><select id="category"><option value="Security">Security</option><option value="Tips">Tips</option></select><textarea id="excerpt" placeholder="Excerpt"></textarea><button onclick="addBlog()">Simpan</button>`); }
        function addBlog() { alert('Demo: Artikel ditambahkan'); closeModal(); renderBlog(); }
        function editBlog(id) { alert(`Edit blog ID ${id}`); closeModal(); }
        function deleteBlog(id) { if(confirm('Hapus artikel?')) { alert('Demo: Artikel dihapus'); renderBlog(); } }
        
        function renderBookings() {
            let html = `<div class="data-table"><h3>Booking Konsultasi</h3><table><tr><th>Nama</th><th>Layanan</th><th>Tanggal</th><th>Status</th><th>Aksi</th></tr>`;
            bookings.forEach(b => {
                html += `<tr><td>${b.name}</td><td>${b.service}</td><td>${b.date}</td><td>${b.status}</td><td><button onclick="confirmBooking(${b.id})">Konfirmasi</button></td></tr>`;
            });
            html += `</table></div>`;
            document.getElementById('content').innerHTML = html;
        }
        function confirmBooking(id) { alert(`Booking ID ${id} dikonfirmasi`); }
        
        function renderMessages() {
            let html = `<div class="data-table"><h3>Pesan Masuk</h3><table><tr><th>Nama</th><th>Email</th><th>Pesan</th><th>Status</th><th>Aksi</th></tr>`;
            messages.forEach(m => {
                html += `<tr><td>${m.name}</td><td>${m.email}</td><td>${m.message.substring(0, 30)}...</td><td>${m.status}</td><td><button onclick="markRead(${m.id})">Tandai Dibaca</button></td></tr>`;
            });
            html += `</table></div>`;
            document.getElementById('content').innerHTML = html;
        }
        function markRead(id) { alert(`Pesan ID ${id} ditandai dibaca`); }
        
        document.querySelectorAll('.sidebar a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
                link.classList.add('active');
                const page = link.getAttribute('data-page');
                if (page === 'dashboard') renderDashboard();
                else if (page === 'testimonials') renderTestimonials();
                else if (page === 'portfolio') renderPortfolio();
                else if (page === 'blog') renderBlog();
                else if (page === 'bookings') renderBookings();
                else if (page === 'messages') renderMessages();
            });
        });
        renderDashboard();
    </script>
</body>
</html>
