        .blog-detail-content {

<body>
    <a href="https://wa.me/628211951858" class="wa-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <footer class="footer">

        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        const blogDataLocal = [
            { id: 1, title: "Cara Melindungi Website dari Serangan XSS", date: "15 Mei 2025", category: "Security", content: "<p>Cross-Site Scripting (XSS) adalah salah satu kerentanan keamanan yang paling umum ditemukan pada aplikasi web. XSS memungkinkan penyerang untuk menyuntikkan script berbahaya ke dalam halaman web yang dilihat oleh pengguna lain.</p><p>Berikut adalah beberapa cara melindungi website dari serangan XSS: <strong>1. Validasi Input</strong> - Selalu validasi input dari pengguna. <strong>2. Sanitasi Output</strong> - Encode karakter berbahaya seperti &lt; &gt; &quot; &apos; &amp;. <strong>3. Gunakan CSP (Content Security Policy)</strong> - Batasi sumber script yang boleh dijalankan.</p>" },
            { id: 2, title: "5 Tips Meningkatkan Kecepatan Website", date: "10 Mei 2025", category: "Tips", content: "<p>Kecepatan website adalah faktor penting untuk SEO dan pengalaman pengguna. Berikut 5 tips meningkatkannya: <strong>1. Kompres gambar</strong> - Gunakan format WebP. <strong>2. Minify CSS/JS</strong> - Perkecil ukuran file. <strong>3. Gunakan CDN</strong> - Sebarkan konten ke server terdekat. <strong>4. Cache browser</strong> - Simpan aset statis. <strong>5. Optimasi database</strong> - Hapus data tidak perlu.</p>" },
            { id: 3, title: "Mengapa Bisnis Perlu Aplikasi Mobile?", date: "5 Mei 2025", category: "Mobile", content: "<p>Aplikasi mobile bukan lagi kemewahan, tapi kebutuhan. Berikut alasannya: <strong>1. Akses 24/7</strong> - Pelanggan bisa mengakses kapan saja. <strong>2. Personalisasi</strong> - Pengalaman yang lebih personal. <strong>3. Notifikasi push</strong> - Komunikasi langsung dengan pelanggan. <strong>4. Branding</strong> - Meningkatkan citra profesional. <strong>5. Keuntungan kompetitif</strong> - Stay ahead dari pesaing.</p>" }
        ];
        
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }
        
        const id = getQueryParam('id');
        const blog = blogDataLocal.find(b => b.id == id) || blogDataLocal[0];
        
        document.getElementById('blogDetailHero').innerHTML = `<h1>${blog.title}</h1><div class="blog-detail-meta"><i class="far fa-calendar-alt"></i> ${blog.date} | <i class="far fa-folder"></i> ${blog.category}</div>`;
        document.getElementById('blogDetailContent').innerHTML = `
            <div class="blog-detail-body">${blog.content}<a href="blog.html" class="btn-secondary back-to-blog">← Kembali ke Blog</a></div>
        `;
        renderSocialLinks();
        initMobileMenu();
    </script>
