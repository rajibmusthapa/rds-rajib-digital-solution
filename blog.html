<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Blog RDS - Rajib Digital Solution</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .blog-hero {
            background: linear-gradient(135deg, #0a192f, #0a0f1a);
            padding: 120px 0 60px;
            text-align: center;
        }
        .blog-hero h1 { font-size: 48px; margin-bottom: 15px; }
        .blog-hero h1 span { color: #64ffda; }
        .blog-hero p { font-size: 18px; color: #94a3b8; max-width: 700px; margin: 0 auto; }
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            padding: 60px 0;
        }
        .blog-card {
            background: #111827;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(100,255,218,0.1);
            transition: 0.3s;
        }
        .blog-card:hover { transform: translateY(-5px); border-color: #64ffda; }
        .blog-img {
            height: 180px;
            background: linear-gradient(135deg, #64ffda, #00aaff);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .blog-img i { font-size: 50px; color: white; }
        .blog-info { padding: 20px; }
        .blog-date { font-size: 11px; color: #94a3b8; margin-bottom: 8px; }
        .blog-title { font-size: 18px; margin-bottom: 10px; }
        .blog-excerpt { font-size: 13px; color: #94a3b8; margin-bottom: 15px; line-height: 1.5; }
        .read-more { color: #64ffda; text-decoration: none; font-weight: 600; font-size: 13px; }
        @media (max-width: 768px) {
            .blog-hero h1 { font-size: 32px; }
            .blog-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <a href="https://wa.me/628211951858" class="wa-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <header class="header">
        <div class="container">
            <div class="logo"><h1>RDS</h1><p>Rajib Digital Solution</p></div>
            <nav class="nav" id="navMenu">
                <a href="index.html">Beranda</a>
                <a href="services.html">Layanan</a>
                <a href="portfolio.html">Portofolio</a>
                <a href="blog.html">Blog</a>
                <a href="contact.html">Kontak</a>
            </nav>
            <div class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></div>
        </div>
    </header>

    <section class="blog-hero">
        <h1>Blog <span>RDS</span></h1>
        <p>Artikel & tips seputar teknologi, web development, mobile app, dan cyber security.</p>
    </section>

    <div class="container">
        <div class="blog-grid" id="blogGrid"></div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-grid">
                <div><h3>RDS</h3><div class="social-links" id="socialLinks"></div></div>
                <div><h4>Menu</h4><a href="index.html">Beranda</a><a href="services.html">Layanan</a><a href="portfolio.html">Portofolio</a><a href="blog.html">Blog</a></div>
                <div><h4>Kontak</h4><p><i class="fab fa-whatsapp"></i> +62 821-1951-858</p></div>
            </div>
            <div class="footer-bottom"><p>© 2025 RDS - Rajib Digital Solution.</p></div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        const blogData = [
            { id: 1, title: "Cara Melindungi Website dari Serangan XSS", excerpt: "Pelajari teknik dasar mencegah serangan Cross-Site Scripting pada website Anda.", date: "15 Mei 2025", category: "Security", icon: "fas fa-shield-alt" },
            { id: 2, title: "5 Tips Meningkatkan Kecepatan Website", excerpt: "Optimasi performa website untuk pengalaman pengguna yang lebih baik.", date: "10 Mei 2025", category: "Tips", icon: "fas fa-tachometer-alt" },
            { id: 3, title: "Mengapa Bisnis Perlu Aplikasi Mobile?", excerpt: "Keuntungan memiliki aplikasi mobile untuk mengembangkan bisnis Anda.", date: "5 Mei 2025", category: "Mobile", icon: "fas fa-mobile-alt" }
        ];
        
        function renderBlog() {
            const grid = document.getElementById('blogGrid');
            grid.innerHTML = '';
            blogData.forEach(blog => {
                grid.innerHTML += `
                    <div class="blog-card">
                        <div class="blog-img"><i class="${blog.icon}"></i></div>
                        <div class="blog-info">
                            <div class="blog-date"><i class="far fa-calendar-alt"></i> ${blog.date} | ${blog.category}</div>
                            <h3 class="blog-title">${blog.title}</h3>
                            <p class="blog-excerpt">${blog.excerpt}</p>
                            <a href="blog-detail.html?id=${blog.id}" class="read-more">Baca Selengkapnya →</a>
                        </div>
                    </div>
                `;
            });
        }
        renderBlog();
        renderSocialLinks();
        initMobileMenu();
    </script>
</body>
</html>
