<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Booking Konsultasi - RDS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .booking-hero {
            background: linear-gradient(135deg, #0a192f, #0a0f1a);
            padding: 120px 0 40px;
            text-align: center;
        }
        .booking-hero h1 { font-size: 48px; margin-bottom: 15px; }
        .booking-hero h1 span { color: #64ffda; }
        .booking-container { max-width: 600px; margin: 40px auto 60px; padding: 0 20px; }
        .booking-card {
            background: #111827;
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(100,255,218,0.1);
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            background: #0a0f1a;
            border: 1px solid #2d3a5e;
            border-radius: 10px;
            color: #e6f1ff;
            font-family: inherit;
        }
        .date-time { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-submit { width: 100%; padding: 14px; background: #64ffda; color: #0a192f; border: none; border-radius: 40px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        @media (max-width: 768px) {
            .booking-hero h1 { font-size: 32px; }
            .date-time { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <a href="https://wa.me/628211951858" class="wa-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <header class="header">
        <div class="container">
            <div class="logo"><h1>RDS</h1><p>Rajib Digital Solution</p></div>
            <nav class="nav" id="navMenu">
                <a href="index.html">Beranda</a>
                <a href="services.html">Layanan</a>
                <a href="portfolio.html">Portofolio</a>
                <a href="blog.html">Blog</a>
                <a href="contact.html">Kontak</a>
                <a href="booking.html">Booking</a>
            </nav>
            <div class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></div>
        </div>
    </header>

    <section class="booking-hero">
        <h1>Booking <span>Konsultasi</span></h1>
        <p>Isi form di bawah, tim RDS akan menghubungi Anda maksimal 1x24 jam.</p>
    </section>

    <div class="booking-container">
        <div class="booking-card">
            <form id="bookingForm">
                <div class="form-group">
                    <label>Nama Lengkap *</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Nomor WhatsApp *</label>
                    <input type="tel" id="phone" placeholder="08123456789" required>
                </div>
                <div class="form-group">
                    <label>Layanan yang Diminati</label>
                    <select id="service">
                        <option>Web Development</option>
                        <option>Mobile App Development</option>
                        <option>Cyber Security</option>
                        <option>Custom Software</option>
                        <option>Konsultasi Umum</option>
                    </select>
                </div>
                <div class="date-time">
                    <div class="form-group">
                        <label>Tanggal *</label>
                        <input type="date" id="bookingDate" required>
                    </div>
                    <div class="form-group">
                        <label>Jam *</label>
                        <select id="bookingTime" required>
                            <option value="">Pilih Jam</option>
                            <option value="09:00">09:00 - 10:00</option>
                            <option value="10:00">10:00 - 11:00</option>
                            <option value="11:00">11:00 - 12:00</option>
                            <option value="13:00">13:00 - 14:00</option>
                            <option value="14:00">14:00 - 15:00</option>
                            <option value="15:00">15:00 - 16:00</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Catatan / Pertanyaan</label>
                    <textarea id="notes" rows="3" placeholder="Tulis pertanyaan yang ingin ditanyakan..."></textarea>
                </div>
                <button type="submit" class="btn-submit">📅 Booking Sekarang</button>
            </form>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-grid">
                <div><h3>RDS</h3><div class="social-links" id="socialLinks"></div></div>
                <div><h4>Menu</h4><a href="index.html">Beranda</a><a href="services.html">Layanan</a><a href="portfolio.html">Portofolio</a></div>
                <div><h4>Kontak</h4><p><i class="fab fa-whatsapp"></i> +62 821-1951-858</p></div>
            </div>
            <div class="footer-bottom"><p>© 2025 RDS - Rajib Digital Solution.</p></div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        document.getElementById('bookingDate').min = tomorrow.toISOString().split('T')[0];
        
        document.getElementById('bookingForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const service = document.getElementById('service').value;
            const date = document.getElementById('bookingDate').value;
            const time = document.getElementById('bookingTime').value;
            const notes = document.getElementById('notes').value;
            
            if (!name || !email || !phone || !date || !time) {
                alert('⚠️ Mohon isi semua field yang wajib!');
                return;
            }
            
            const waMsg = `Halo RDS!%0A%0A📅 BOOKING BARU%0A%0ANama: ${name}%0AEmail: ${email}%0AWA: ${phone}%0ALayanan: ${service}%0AJadwal: ${date} jam ${time}%0ACatatan: ${notes}`;
            window.open(`https://wa.me/628211951858?text=${waMsg}`, '_blank');
            alert('✅ Booking berhasil! Tim RDS akan menghubungi Anda.');
            document.getElementById('bookingForm').reset();
        });
        renderSocialLinks();
        initMobileMenu();
    </script>
</body>
</html>
